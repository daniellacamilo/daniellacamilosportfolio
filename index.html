<!DOCTYPE html>
<html lang="pt-br">
<head>

        <!-- Fontes do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
        <!-- Fonte do Google - Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Daniella Camilo">
    <meta name="description" content="Personal Website of Daniella Camilo, a Full Stack developer specializing in creating amazing digital experiences. You can see my projects and get in touch.">
    <meta name="robots" content="index, follow">

    <link rel="icon" type="image/svg+xml" href="./assets/img/favicon.svg">


    <!-- SWIPER CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    

    <!-- CSS principal da página -->
    <link rel="stylesheet" href="./assets/css/style.css">

    <title>Personal Website</title>
</head>
<body>

    <!-- Cabeçalho da página -->
    <header>
        
        <div class="menu-content">

    <!-- Título do Cabeçalho -->
     <a href="index.html" id="titulo">Portfolio</a>

    <!-- Menu da Navegação -->
       <nav>
        <ul class="menu-list">
            <li><a href="#hero">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
       </nav>
       </div>
    </header>

    <!-- Seção Principal da página -->
    <main>

        <!--Seção Hero-->
        <section id="hero" class="section-container hero-container">

            <!--Boas Vindas -->
            <article class="hero-content">
                <span>👋Hello, I'm Daniella</span>
                <h1>Full Stack Developer</h1>
                <p>I transform ideas into code and create amazing digital experiences</p>

                <div class="buttons-container">
                    <a href="#contact" class="botao">Get in Touch</a>
                    <a href="#about" class="botao-outline">Learn More...</a>
                </div>
            </article>

            <!--Imagem da Seção Hero -->
            <figure class="hero-image">
                <img src="./assets/img/eu.png"
                alt="Foto do autor do site"
                class="float-animation">

            </figure>

        </section>

         <!--Seção About-->
        <section id="about" class="section-container about-container">

            
        </section>

         <!--Seção Projetos do autor-->
        <section id="projects" class="section-container projects-container">
            <h2>My Projects</h2>

            <!-- Swiper Container -->
            <div class="swiper projects-swiper">
                <div class="swiper-wrapper">
                    
                </div>
            <!-- Botões de Navegação -->
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>

            <!-- Paginação -->
            <div class="swiper-pagination"></div>
        </div>

        </section>

         <!--Seção Contact-->
        <section id="contact" class="section-container contact-container">


            <!-- Redes Sociais -->
            <article class="contact-info">

                <h2>Get in Touch</h2>
                <p>Feel free to reach out to me!</p>

                <!-- Links para as Redes Sociais -->
                <div>
                  <a href="https://www.linkedin.com/in/daniella-camilo-3b64b0393/" target="_blank" class="social-icon" aria-label="Linkedin">
                    <img src="./assets/icons/social/linkedin.svg" 
                        alt="Link para o Linkedin"
                    >
                    </a>

                  <a href="https://github.com/daniellacamilo" target="_blank" class="social-icon" aria-label="GitHub">
                    <img src="./assets/icons/social/github.svg" 
                        alt="Link para o GitHub"
                    >
                    </a>

                  <a href="https://www.instagram.com/daniellacamilo/" target="_blank" class="social-icon" aria-label="Instagram">
                    <img src="./assets/icons/social/instagram.svg" 
                        alt="Link para o Instagram"
                    >
                </a>
                </div>

            </article>

            <!-- Formulário de contato -->
             <form id="formulario" action="https://formsubmit.co/5a6a55269765ff187f492469d684ad94" method="POST">

            <input type="hidden" name="_next" value="https://daniellacamilo.github.io/daniellacamilosportfolio/success.html">
            <input type="hidden" name="_captcha" value="false">
                <label for="nome">Name</label>
                <input id="nome" name="nome" type="text" placeholder="Enter your full name">
                <span id="erro-nome"></span>

                <label for="e-mail">E-mail</label>
                <input id="email" name="email" type="text" placeholder="Enter your email">
                <span id="erro-email"></span>

                <label for="assunto">Subject</label>
                <input id="assunto" name="assunto" type="text" placeholder="Enter the subject of the message">
                <span id="erro-assunto"></span>

                <label for="mensagem">Message</label>
                <textarea id="mensagem" name="mensagem" type="text" placeholder="Enter your message"></textarea>
                <span id="erro-mensagem"></span>

                <button class="botao" type="submit">Send Message</button>
             </form>

        </section>

    </main>

    <!-- Rodapé da página -->
    <footer>
        Developed by Daniella Camilo - 2026
    </footer>

    <!-- SWIPER JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!-- Script JavaScript -->
    <script src="./assets/js/script.js"></script>

</body>
</html>
